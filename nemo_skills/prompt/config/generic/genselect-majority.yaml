
user: |-
  You will be given a problem followed by an enumerated list of {num_solutions} candidate solutions. Your task is to perform a "majority vote": identify solutions with similar answers, find the most common answer, and determine the best solution to represent that answer.

  Problem: {problem}

  Solutions:
  {solutions}

  End your evaluation with exactly:
  Judgment: [IDX]
  where IDX is the index 0-{max_idx} of the best solution.

  Example: If Solution 2 (index 2) is best, write: "Judgment: 2" at the end.

  Important: Use only the format "Judgment: 2" with no special formatting, quotes, or additional characters.
